name: Deploy Portfolio to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAMECHEAP_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.NAMECHEAP_PORT }} ${{ secrets.NAMECHEAP_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist
        run: |
          scp -P ${{ secrets.NAMECHEAP_PORT }} -r dist/* \
          ${{ secrets.NAMECHEAP_USER }}@${{ secrets.NAMECHEAP_HOST }}:~/public_html/